<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Patente AM - Gestionale Completo</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --dark: #343a40; --warning: #ffc107; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .hide { display: none; }
        
        /* Navigazione */
        .nav-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-main { background: var(--primary); color: white; width: 100%; }
        
        /* Insegnante */
        .admin-box { background: #f9f9f9; padding: 20px; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 20px; }
        .grid-form { display: grid; grid-template-columns: 1fr 2fr 1fr 1fr 1fr; gap: 10px; }
        .search-box { width: 100%; padding: 12px; margin: 20px 0; border: 2px solid var(--primary); border-radius: 8px; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: var(--dark); color: white; position: sticky; top: 0; }
        .img-prev { max-width: 60px; border-radius: 4px; }

        /* Studente */
        .quiz-box { text-align: center; padding: 20px; }
        #q-img-display { max-width: 350px; margin: 20px auto; display: block; border-radius: 8px; border: 1px solid #ddd; }
        .stats-bar { display: flex; justify-content: space-around; background: #eee; padding: 10px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div class="nav-bar">
            <h2>🚗 Patente AM Simulator</h2>
            <div>
                <button class="btn" id="btn-to-admin" onclick="checkAdmin()">⚙️ Area Insegnante</button>
                <button class="btn hide" id="btn-to-student" onclick="showScreen('screen-login')" style="background:#6c757d; color:white;">👨‍🎓 Lato Studente</button>
            </div>
        </div>

        <div id="screen-login" class="quiz-box">
            <h1>Benvenuto</h1>
            <p>Inserisci il tuo nome per iniziare la simulazione</p>
            <input type="text" id="stud-name" placeholder="Tuo Nome" style="padding:12px; width:250px; border-radius:8px; border:1px solid #ccc;"><br><br>
            <button class="btn btn-main" style="max-width:250px" onclick="loginStudent()">ENTRA</button>
        </div>

        <div id="screen-dashboard" class="hide">
            <h3>Ciao <span id="user-name"></span>, seleziona l'argomento da studiare:</h3>
            <select id="select-topic" style="width:100%; padding:15px; border-radius:8px; font-size:1rem; margin-bottom:20px;"></select>
            <button class="btn btn-main" onclick="startQuiz()">INIZIA QUIZ</button>
        </div>

        <div id="screen-quiz" class="hide quiz-box">
            <div class="stats-bar">
                <span id="stat-idx">Domanda 0/0</span>
                <span id="stat-err" style="color:var(--danger)">Errori: 0</span>
            </div>
            <small id="q-meta" style="color:gray"></small>
            <h2 id="q-text" style="min-height:80px; margin:20px 0;"></h2>
            <img id="q-img-display" src="" style="display:none;">
            <div style="display:flex; gap:20px; margin-top:30px;">
                <button class="btn" style="flex:1; background:var(--success); color:white; font-size:1.5rem;" onclick="handleAnswer(true)">VERO</button>
                <button class="btn" style="flex:1; background:var(--danger); color:white; font-size:1.5rem;" onclick="handleAnswer(false)">FALSO</button>
            </div>
        </div>

        <div id="screen-results" class="hide quiz-box">
            <h1 id="res-outcome"></h1>
            <p id="res-details" style="font-size:1.2rem;"></p>
            <div id="wrong-list" style="text-align:left; background:#fff1f1; padding:20px; border-radius:10px; margin-top:20px; border:1px solid #facaca;"></div>
            <button class="btn btn-main" onclick="showScreen('screen-dashboard')" style="margin-top:20px;">FAI UN ALTRO TEST</button>
        </div>

        <div id="screen-admin" class="hide">
            <h1>Gestione Archivio Insegnante</h1>
            <div class="admin-box">
                <div class="grid-form">
                    <input type="text" id="adm-code" placeholder="Codice">
                    <input type="text" id="adm-text" placeholder="Testo">
                    <input type="text" id="adm-topic" placeholder="Argomento">
                    <select id="adm-ans"><option value="true">VERO</option><option value="false">FALSO</option></select>
                    <input type="file" id="adm-file" accept="image/*">
                </div>
                <div style="display:flex; gap:10px; margin-top:15px;">
                    <button id="btn-save" class="btn btn-main" onclick="saveQuestion()">SALVA / MODIFICA</button>
                    <button id="btn-cancel" class="btn hide" onclick="resetAdminForm()" style="background:#6c757d; color:white;">ANNULLA</button>
                </div>
                <button class="btn" style="background:#6f42c1; color:white; width:100%; margin-top:10px;" onclick="exportDatabase()">💾 ESPORTA DATABASE.JS (PERMANENTE)</button>
            </div>

            <input type="text" id="admin-search" class="search-box" placeholder="🔍 Cerca per codice o testo..." onkeyup="filterTable()">

            <div style="max-height: 450px; overflow-y: auto; border: 1px solid #ddd;">
                <table>
                    <thead><tr><th>Cod.</th><th>Argom.</th><th>Testo</th><th>Risp.</th><th>Foto</th><th>Azioni</th></tr></thead>
                    <tbody id="admin-table"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="database.js"></script>
    <script>
        // Inizializzazione dati
        let localChanges = JSON.parse(localStorage.getItem('patente_local_db')) || [];
        let fullDB = [];
        let tempImg = "";
        let editIdx = -1;
        let quizSession = { list: [], idx: 0, err: 0, mistakes: [] };

        // Caricamento Immagine
        document.getElementById('adm-file').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = (ev) => tempImg = ev.target.result;
            if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
        });

        function syncData() {
            const base = (typeof ARCHIVIO_MASTER !== 'undefined') ? ARCHIVIO_MASTER : [];
            // Uniamo: le modifiche locali sovrasvivono a quelle del file se hanno lo stesso codice
            fullDB = JSON.parse(JSON.stringify(base)); 
            localChanges.forEach(mod => {
                const i = fullDB.findIndex(q => q.code === mod.code);
                if(i !== -1) fullDB[i] = mod; else fullDB.push(mod);
            });
            renderAdminTable();
        }

        // NAVIGAZIONE
        function showScreen(id) {
            ['screen-login', 'screen-dashboard', 'screen-quiz', 'screen-results', 'screen-admin'].forEach(s => document.getElementById(s).classList.add('hide'));
            document.getElementById(id).classList.remove('hide');
            document.getElementById('btn-to-admin').classList.toggle('hide', id === 'screen-admin');
            document.getElementById('btn-to-student').classList.toggle('hide', id !== 'screen-admin');
        }

        function checkAdmin() {
            if(prompt("Password Insegnante:") === "admin") { syncData(); showScreen('screen-admin'); }
        }

        // LOGICA INSEGNANTE
        function saveQuestion() {
            const code = document.getElementById('adm-code').value;
            const text = document.getElementById('adm-text').value;
            if(!code || !text) return alert("Codice e Testo obbligatori!");

            const newQ = {
                code, text,
                topic: document.getElementById('adm-topic').value || "Generale",
                ans: document.getElementById('adm-ans').value === "true",
                img: tempImg || (editIdx !== -1 ? fullDB[editIdx].img : "")
            };

            const existingIdx = localChanges.findIndex(q => q.code === code);
            if(existingIdx !== -1) localChanges[existingIdx] = newQ; else localChanges.push(newQ);

            localStorage.setItem('patente_local_db', JSON.stringify(localChanges));
            resetAdminForm(); syncData();
            alert("Salvato correttamente in memoria locale.");
        }

        function editQuestion(i) {
            editIdx = i;
            const q = fullDB[i];
            document.getElementById('adm-code').value = q.code;
            document.getElementById('adm-text').value = q.text;
            document.getElementById('adm-topic').value = q.topic;
            document.getElementById('adm-ans').value = q.ans.toString();
            document.getElementById('btn-save').innerText = "CONFERMA MODIFICHE";
            document.getElementById('btn-save').style.background = "var(--warning)";
            document.getElementById('btn-cancel').classList.remove('hide');
            window.scrollTo(0,0);
        }

        function deleteQuestion(i) {
            if(confirm("Eliminare questa domanda? (Sarà rimosso l'aggiornamento locale)")) {
                const codeToDelete = fullDB[i].code;
                localChanges = localChanges.filter(q => q.code !== codeToDelete);
                // Se vuoi nascondere anche quelle del file JS dovresti gestire una blacklist, 
                // per ora rimuoviamo solo i cambiamenti locali.
                localStorage.setItem('patente_local_db', JSON.stringify(localChanges));
                syncData();
            }
        }

        function resetAdminForm() {
            editIdx = -1; tempImg = "";
            document.getElementById('adm-code').value = "";
            document.getElementById('adm-text').value = "";
            document.getElementById('adm-topic').value = "";
            document.getElementById('adm-file').value = "";
            document.getElementById('btn-save').innerText = "SALVA / MODIFICA";
            document.getElementById('btn-save').style.background = "var(--primary)";
            document.getElementById('btn-cancel').classList.add('hide');
        }

        function filterTable() {
            const val = document.getElementById('admin-search').value.toLowerCase();
            document.querySelectorAll("#admin-table tr").forEach(row => {
                row.style.display = row.innerText.toLowerCase().includes(val) ? "" : "none";
            });
        }

        function renderAdminTable() {
            document.getElementById('admin-table').innerHTML = fullDB.map((q, i) => `
                <tr>
                    <td><b>${q.code}</b></td><td><small>${q.topic}</small></td><td>${q.text}</td>
                    <td>${q.ans?'V':'F'}</td><td>${q.img ? `<img src="${q.img}" class="img-prev">` : '-'}</td>
                    <td>
                        <button onclick="editQuestion(${i})">✏️</button>
                        <button onclick="deleteQuestion(${i})" style="color:red">🗑️</button>
                    </td>
                </tr>`).join('');
        }

        function exportDatabase() {
            const blob = new Blob(["const ARCHIVIO_MASTER = " + JSON.stringify(fullDB, null, 2) + ";"], {type: "text/javascript"});
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "database.js"; a.click();
        }

        // LOGICA STUDENTE
        function loginStudent() {
            const name = document.getElementById('stud-name').value;
            if(!name) return alert("Inserisci il tuo nome!");
            document.getElementById('user-name').innerText = name;
            syncData();
            const topics = [...new Set(fullDB.map(q => q.topic))];
            document.getElementById('select-topic').innerHTML = '<option value="all">SIMULAZIONE ESAME (Tutti gli argomenti)</option>' + topics.map(t => `<option value="${t}">${t}</option>`).join('');
            showScreen('screen-dashboard');
        }

        function startQuiz() {
            const t = document.getElementById('select-topic').value;
            quizSession.list = t === 'all' ? [...fullDB] : fullDB.filter(q => q.topic === t);
            if(quizSession.list.length === 0) return alert("Nessuna domanda trovata.");
            quizSession.list.sort(() => Math.random() - 0.5);
            quizSession.idx = 0; quizSession.err = 0; quizSession.mistakes = [];
            showScreen('screen-quiz');
            renderQuestion();
        }

        function renderQuestion() {
            const q = quizSession.list[quizSession.idx];
            document.getElementById('stat-idx').innerText = `Domanda ${quizSession.idx + 1} di ${quizSession.list.length}`;
            document.getElementById('stat-err').innerText = `Errori: ${quizSession.err}`;
            document.getElementById('q-text').innerText = q.text;
            document.getElementById('q-meta').innerText = `Codice: ${q.code} | Argomento: ${q.topic}`;
            const imgDisplay = document.getElementById('q-img-display');
            if(q.img) { imgDisplay.src = q.img; imgDisplay.style.display = "block"; } else { imgDisplay.style.display = "none"; }
        }

        function handleAnswer(ans) {
            const q = quizSession.list[quizSession.idx];
            if(ans !== q.ans) { quizSession.err++; quizSession.mistakes.push(q); }
            quizSession.idx++;
            if(quizSession.idx < quizSession.list.length) renderQuestion(); else showResults();
        }

        function showResults() {
            showScreen('screen-results');
            const pass = quizSession.err <= 4;
            document.getElementById('res-outcome').innerText = pass ? "IDONEO ✅" : "RESPINTO ❌";
            document.getElementById('res-outcome').style.color = pass ? "green" : "red";
            document.getElementById('res-details').innerText = `Hai commesso ${quizSession.err} errori su ${quizSession.list.length} domande.`;
            const log = document.getElementById('wrong-list');
            if(quizSession.mistakes.length > 0) {
                log.style.display = "block";
                log.innerHTML = "<h3>Domande da ripassare:</h3>" + quizSession.mistakes.map(m => `<p><b>${m.code}</b>: ${m.text} (Risp. corretta: ${m.ans?'V':'F'})</p>`).join('');
            } else { log.style.display = "none"; }
        }

        // Avvio iniziale
        window.onload = syncData;
    </script>
</body>
</html>
